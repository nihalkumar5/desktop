<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise ❤️</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="heart-container"></div>
    
    <div class="music-control">
        <button id="music-btn" class="glass-btn">
            <i class="fa-solid fa-music"></i>
        </button>
        <audio id="bg-music" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <main id="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <div class="glass-card fade-in">
                <h1 class="romantic-text">Hey Beautiful...</h1>
                <p class="subtitle">I have a very important question for you.</p>
                
                <div class="tease-container">
                    <h2 class="question">Do you want to see how much I love you?</h2>
                    <div class="btn-group">
                        <button id="yes-btn" class="btn-primary">Yes! ❤️</button>
                        <button id="no-btn" class="btn-secondary">No 😜</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Hidden Surprise Modal -->
        <div id="surprise-modal" class="modal">
            <div class="modal-content glass-card">
                <h2 class="romantic-text">I Knew You'd Say Yes!</h2>
                <div class="infinity-container">
                    <svg class="infinity-svg" viewBox="0 0 100 100">
                        <path d="M20,50 C20,30 40,30 50,50 C60,70 80,70 80,50 C80,30 60,30 50,50 C40,70 20,70 20,50" fill="none" stroke="currentColor" stroke-width="2" />
                    </svg>
                </div>
                <h1 class="love-title">I Love You <span class="accent-text">Infinity</span></h1>
                <p class="letter-text">"Every second with you is a gift I'll cherish forever."</p>
                <button id="close-modal" class="btn-primary">Forever & Always</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
